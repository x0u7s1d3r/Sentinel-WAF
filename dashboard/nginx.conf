server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # L'API de contrôle du WAF est relayée vers la passerelle : le navigateur
    # ne voit qu'une seule origine (le dashboard), donc aucun souci de CORS.
    location /_sentinel/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Application React (SPA) : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
