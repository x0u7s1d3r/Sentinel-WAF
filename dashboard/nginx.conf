server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS interne de Docker. En passant l'upstream par une variable,
    # nginx résout le nom "gateway" À CHAQUE REQUÊTE (et non une seule fois au
    # démarrage) : le dashboard ne crashe plus si la passerelle démarre après lui.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # L'API de contrôle du WAF est relayée vers la passerelle : le navigateur
    # ne voit qu'une seule origine (le dashboard), donc aucun souci de CORS.
    location /_sentinel/ {
        set $sentinel_upstream http://gateway:8080;
        proxy_pass $sentinel_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Application React (SPA) : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
