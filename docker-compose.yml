# Sentinel WAF — topologie de déploiement.
# État actuel (v0.1) : la passerelle Go est opérationnelle et protège un
# backend de démonstration. PostgreSQL et Redis sont déjà déclarés (topologie
# cible) et seront câblés à la couche stockage/rate-limiting au sprint suivant.
services:

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8000:8080"
    environment:
      # surcharge possible sans reconstruire l'image
      - SENTINEL_UPSTREAM=http://demo-target:80
      - SENTINEL_DB_URL=postgres://sentinel:change_me@postgres:5432/sentinel?sslmode=disable
      # Alertes Slack (facultatif) : renseignées via un fichier .env local.
      # Si .env est absent, les valeurs par défaut désactivent proprement Slack.
      - SENTINEL_SLACK_WEBHOOK=${SENTINEL_SLACK_WEBHOOK:-}
      - SENTINEL_ALERT_INTERVAL_SEC=${SENTINEL_ALERT_INTERVAL_SEC:-15}
      - SENTINEL_ADMIN_PASSWORD=${SENTINEL_ADMIN_PASSWORD}
    depends_on:
      - demo-target
      - postgres
    restart: unless-stopped

  # Backend de démonstration (renvoie les infos de la requête reçue).
  # À remplacer par l'application réelle de la PME à protéger.
  demo-target:
    image: traefik/whoami
    restart: unless-stopped

  # Console d'administration (plan de contrôle) : sert l'interface React et
  # relaie l'API vers la passerelle. Séparée du plan de données (le proxy).
  dashboard:
    build:
      context: ./dashboard
    ports:
      - "8081:80"
    depends_on:
      - gateway
    restart: unless-stopped
  
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    restart: unless-stopped
    # pas de "ports:" — le WAF y accède en interne via http://dvwa:80

  # --- Couche de données (prête, câblage au sprint stockage) ---
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=change_me
      - POSTGRES_DB=sentinel
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pgdata:


