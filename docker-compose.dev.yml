# Sentinel WAF — déploiement clé en main.
#
# Démarrage : ./start.sh   (ou : docker compose up -d --build)
# Accès :
#   • Console d'administration : http://localhost:3000
#   • Passerelle WAF (proxy)   : http://localhost:8000
#
# Toute la configuration (secrets, alertes, IA…) se fait via le fichier .env
# (copié depuis .env.example) OU directement depuis la console web.

services:

  # ── Passerelle WAF (plan de données) : inspecte et filtre le trafic ──
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "${SENTINEL_HTTP_PORT:-8000}:8080"
    env_file:
      - .env
    environment:
      - SENTINEL_UPSTREAM=http://demo-target:80
      - SENTINEL_DB_URL=postgres://sentinel:${POSTGRES_PASSWORD:-change_me}@postgres:5432/sentinel?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_sentinel/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Console d'administration (plan de contrôle) : interface web ──
  dashboard:
    build:
      context: ./dashboard
    ports:
      - "${SENTINEL_DASHBOARD_PORT:-3000}:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # ── Base de données : persistance des événements et de la configuration ──
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
      - POSTGRES_DB=sentinel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Application de démonstration (exemple protégé par le WAF) ──
  # Remplacez-la par votre propre application, ou ajoutez la vôtre depuis la
  # console (onglet « Applications »). Renvoie les détails de la requête reçue.
  demo-target:
    image: traefik/whoami
    restart: unless-stopped

volumes:
  pgdata:
